<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: black;
    overflow: hidden; /* يمنع أي سكرول */
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* الطبقة السوداء الشفافة */
.overlay {
    position: fixed;
    inset: 0;
    background-color: rgba(155, 63, 23, 0.5);
    z-index: 1;
}

/* الصورة */
.container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
}

.container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    position: fixed;
    top: 50px; /* المسافة من فوق الشاشة */
    width: 100%;
    text-align: center;
    font-size: 50px;      /* حجم الخط */
    font-weight: 600;     /* تقيل */
    color: rgb(229, 98, 17);          /* اللون الدهبي */
    z-index: 3;           /* فوق الصورة والطبقة */
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7); /* لمسة ظل */
}


.subtitle {
    position: fixed;
    top: 170px; /* المسافة تحت الاسم */
    width: 100%;
    text-align: center;
    font-size: 20px;          /* حجم الخط مناسب للوصف */
    color: #ffffff;           /* لون دهبي فاتح */
    font-weight: 400;          /* تقيل قليلًا */
    z-index: 3;
    font-family: 'Poppins', sans-serif;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.6); /* ظل خفيف */
}

/* أيقونات الروابط في الأسفل */
.social-links {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px; /* المسافة بين الأيقونات */
    z-index: 3;
}

.social-links a {
    color: rgb(255, 255, 255); /* اللون الذهبي */
    font-size: 32px; /* حجم الأيقونة */
    transition: transform 0.2s, color 0.2s;
}

.social-links a:hover {
    transform: scale(1.2);
    color: #FFD700; /* ذهب أفتح عند hover */
}
</style>
</head>
<body>



<!-- الطبقة السوداء الشفافة -->
<div class="overlay"></div>

<!-- الصورة -->
<div class="container">
    <img src="image/2.jpg" alt="صورة">

<div class="title">Lempicka</div>

</div>
